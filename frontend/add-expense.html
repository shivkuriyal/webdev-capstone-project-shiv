<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Add a new expense to your tracker.">
    <title>Expense Tracker | Add Expense</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

    <!-- Shared Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===================== HEADER ===================== -->
    <header>
        <div class="header-inner">
            <div class="brand">
                <span class="brand-name">My Expense Tracker</span>
                <span class="brand-tagline">Track every rupee.</span>
            </div>
            <nav class="main-nav">
                <a href="./index.html" class="nav-link">Home</a>
                <a href="./add-expense.html" class="nav-btn">+ Add Entry</a>
            </nav>
        </div>
    </header>

    <!-- ===================== MAIN CONTENT ===================== -->
    <div class="container">

        <!-- Page Title -->
        <h1 class="page-title">Add New Entry</h1>

        <!-- Form Container -->
        <div class="form-container">
            <form id="add-expense-form">

                <!-- Type Dropdown -->
                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type" required>
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                </div>

                <!-- Title Field -->
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="e.g. Lunch, Salary" required>
                </div>

                <!-- Amount Field -->
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" step="0.01" placeholder="e.g. 250.00" required>
                </div>

                <!-- Category Dropdown -->
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Health">Health</option>
                        <option value="Salary">Salary</option>
                        <option value="Freelance">Freelance</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Date Field -->
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit">Add Entry</button>

            </form>
        </div>

    </div>

    <!-- ===================== JAVASCRIPT ===================== -->
    <script>
        // Base URL for the Flask backend API
        const BASE_URL = "http://localhost:5001";

        // Get the form element
        const form = document.getElementById("add-expense-form");

        // ============================================================
        // Handle form submit — POST new expense to backend
        // ============================================================
        form.addEventListener("submit", async function (e) {
            // Prevent the default form submission (page reload)
            e.preventDefault();

            // Read values from the form fields
            const type = document.getElementById("type").value;
            const title = document.getElementById("title").value;
            const amount = parseFloat(document.getElementById("amount").value);
            const category = document.getElementById("category").value;
            const date = document.getElementById("date").value;

            // Validate: amount must be greater than 0
            if (amount <= 0) {
                alert("Amount must be greater than 0!");
                return;
            }

            // Build the entry object to send
            const newExpense = {
                type: type,           // "income" or "expense"
                title: title,
                amount: amount,       // Send as a NUMBER, not a string
                category: category,
                date: date
            };

            try {
                // Send POST request to the backend
                const response = await fetch(`${BASE_URL}/expenses`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(newExpense)
                });

                if (response.ok) {
                    alert("Entry added!");
                    // Redirect back to the home page
                    window.location.href = "index.html";
                } else {
                    const errorData = await response.json();
                    alert("Error: " + errorData.error);
                }
            } catch (error) {
                console.error("Error adding expense:", error);
                alert("Failed to add entry. Make sure the server is running.");
            }
        });
    </script>

</body>
</html>
