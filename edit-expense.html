<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edit an existing expense in your tracker.">
    <title>Expense Tracker | Edit Expense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="brand">
                <span class="brand-name">My Expense Tracker</span>
                <span class="brand-tagline">Track every rupee.</span>
            </div>
            <nav class="main-nav">
                <a href="./index.html" class="nav-link">Home</a>
                <a href="./add-expense.html" class="nav-btn">+ Add Entry</a>
            </nav>
        </div>
    </header>
    <div class="container">
        <h1 class="page-title">Edit Entry</h1>
        <div class="form-container">
            <form id="edit-expense-form">
                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type" required>
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="e.g. Lunch, Salary" required>
                </div>
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" step="0.01" placeholder="e.g. 250.00" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Health">Health</option>
                        <option value="Salary">Salary</option>
                        <option value="Freelance">Freelance</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                </div>
                <button type="submit" class="btn-submit">Update Entry</button>
            </form>
        </div>
    </div>
    <script>
        function getExpensesFromStorage() {
            const data = localStorage.getItem("expenses");
            if (data) { return JSON.parse(data); }
            return [];
        }
        function saveExpensesToStorage(expenses) {
            localStorage.setItem("expenses", JSON.stringify(expenses));
        }
        // Get the expense ID from the URL query string
        const queryParams = new URLSearchParams(window.location.search);
        const urlExpenseId = Number(queryParams.get("id"));

        // Load data and prefill the form
        function loadData() {
            const expenses = getExpensesFromStorage();
            let foundExpense = null;
            for (let i = 0; i < expenses.length; i++) {
                if (expenses[i].id === urlExpenseId) {
                    foundExpense = expenses[i];
                    break;
                }
            }
            if (!foundExpense) { alert("Expense not found"); return; }
            document.getElementById("type").value = foundExpense.type || "expense";
            document.getElementById("title").value = foundExpense.title;
            document.getElementById("amount").value = Number(foundExpense.amount);
            document.getElementById("category").value = foundExpense.category;
            document.getElementById("date").value = foundExpense.date;
        }

        // Handle form submit — Update the expense in localStorage
        const form = document.getElementById("edit-expense-form");
        form.addEventListener("submit", function (e) {
            e.preventDefault();
            const type = document.getElementById("type").value;
            const title = document.getElementById("title").value;
            const amount = parseFloat(document.getElementById("amount").value);
            const category = document.getElementById("category").value;
            const date = document.getElementById("date").value;
            if (amount <= 0) { alert("Amount must be greater than 0!"); return; }
            let expenses = getExpensesFromStorage();
            for (let i = 0; i < expenses.length; i++) {
                if (expenses[i].id === urlExpenseId) {
                    expenses[i].type = type;
                    expenses[i].title = title;
                    expenses[i].amount = amount;
                    expenses[i].category = category;
                    expenses[i].date = date;
                    break;
                }
            }
            saveExpensesToStorage(expenses);
            alert("Entry updated!");
            window.location.href = "index.html";
        });

        // Load data when the page opens
        loadData();
    </script>
</body>
</html>
